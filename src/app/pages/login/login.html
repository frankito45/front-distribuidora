<app-modal (cerrarModal)="cerrarmodal()" [mostrar]="true">

  <form
    [formGroup]="form"
    (ngSubmit)="ingresar()"
    class="space-y-6">

    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-800">
        Iniciar sesión
      </h2>

      <p class="text-gray-500 mt-2">
        Ingresá con tu cuenta para continuar
      </p>
    </div>

    <!-- Email -->
    <div>
      <label class="block mb-2 text-sm font-medium text-gray-700">
        Correo electrónico
      </label>

      <input
        type="email"
        formControlName="email"
        placeholder="correo@ejemplo.com"
        class="w-full rounded-xl border border-gray-300 p-3 outline-none transition
               focus:border-indigo-500 focus:ring-2 focus:ring-indigo-300">
    </div>

    <!-- Password -->
    <div>
      <label class="block mb-2 text-sm font-medium text-gray-700">
        Contraseña
      </label>

      <input
        type="password"
        formControlName="password"
        placeholder="********"
        class="w-full rounded-xl border border-gray-300 p-3 outline-none transition
               focus:border-indigo-500 focus:ring-2 focus:ring-indigo-300">
    </div>

    <!-- Error -->
    @if(error){

      <div
        class="rounded-lg border border-red-300 bg-red-50 p-3 text-center text-red-700">

        {{ error }}

      </div>

    }

    <!-- Botón -->
    <button
      type="submit"
      class="w-full rounded-xl bg-black py-3 text-white font-semibold transition
             hover:bg-gray-800 active:scale-[0.98]">

      Ingresar

    </button>

  </form>

</app-modal>
