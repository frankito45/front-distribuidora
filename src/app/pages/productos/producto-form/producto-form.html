  <a
    routerLink="/producto"
    class="w-full bg-black text-white py-3 px-2 rounded-lg hover:bg-gray-800 transition"
  >
    Volver
  </a>

<form
  [formGroup]="formModel"
  (ngSubmit)="guardar()"
  class="max-w-2xl mx-auto bg-white text-black p-8 rounded-2xl shadow-lg space-y-6 border border-gray-200"
>

  <h2 class="text-2xl font-bold border-b pb-3">
    Nuevo Producto
  </h2>

  <!-- Nombre -->
  <div class="space-y-1">
    <label class="text-sm font-medium">Nombre</label>
    <input
      type="text"
      formControlName="nombre"
      class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
      placeholder="Nombre del producto"
    >
  </div>

  <!-- Descripción -->
  <div class="space-y-1">
    <label class="text-sm font-medium">Descripción</label>
    <textarea
      formControlName="descripcion"
      class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
      placeholder="Descripción"
    ></textarea>
  </div>

  <!-- Precios -->
  <div class="grid grid-cols-2 gap-4">

    <div class="space-y-1">
      <label class="text-sm font-medium">Precio Compra</label>
      <input
        type="number"
        formControlName="precioCompra"
        class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-black"
      >
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium">Precio Venta</label>
      <input
        type="number"
        formControlName="precioVenta"
        class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-black"
      >
    </div>

  </div>

  <!-- Stock -->
  <div class="space-y-1">
    <label class="text-sm font-medium">Stock</label>
    <input
      type="number"
      formControlName="stock"
      class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-black"
    >
  </div>

  <!-- Categoría -->
  @if (categorias$ | async; as categorias) {

    <div class="space-y-1">
      <label class="text-sm font-medium">Categoría</label>

      <select
        formControlName="categoriaId"
        class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-black bg-white"
      >
        <option [value]="0">
          Seleccione una categoría
        </option>

        @for (categoria of categorias; track categoria.id) {
          <option [value]="categoria.id">
            {{ categoria.nombre }}
          </option>
        }
      </select>
    </div>

  }

  <!-- Botón -->
  <button
    type="submit"
    class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition"
  >
    Guardar producto
  </button>

</form>
