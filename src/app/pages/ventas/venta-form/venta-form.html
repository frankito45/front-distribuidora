<a
  routerLink="/venta"
  class="w-full bg-black text-white py-3 px-2 rounded-lg hover:bg-gray-800 transition"
>
  Volver
</a>

<div class="gap-6 mt-6">

@if(ventaId){

  <app-venta-detail [ventaId]="ventaId">
    
  </app-venta-detail>
}
@else {
<div class="flex justify-center mt-10">


  
  <app-content [mostrar]="renderizarFromulario">
  <app-loader-component [loading]= "cargarVentaFormulario">
        <form [formGroup]="formModle" (ngSubmit)="guardar()" class="bg-white shadow-lg rounded-xl p-6 space-y-4  min-w-2xl">
          
          <h2 class="text-2xl font-bold text-gray-800">Nueva Venta</h2>
          
          
          <label class="block text-sm font-semibold text-gray-700">
            Filtrar por barrio
          </label>

          <select
            (change)="filtrarClientes($event)"
            class="w-full border rounded-lg p-3">

            <option value="">Todos</option>

            @if (barrios$ | async; as barrios) {
              @for (barrio of barrios; track barrio.id) {
                <option [value]="barrio.id">
                  {{ barrio.nombre }}
                </option>
              }
            }
          </select>
          
          <select formControlName="clienteId" class="w-full border rounded-lg p-3">
            @if (clientes$ | async; as clientes) {
              @for (cliente of clientes; track cliente.id) {
                <option [value]="cliente.id">
                  {{ cliente.nombre }}
                </option>
              }
            }
          </select>
          
          <button
        type="submit"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition"
      >
        Crear Venta
      </button>
    </form>  
  </app-loader-component>
</app-content>
</div>
}

</div>
